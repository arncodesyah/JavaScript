<!DOCTYPE html>
<head>
    <title>Array in JavaScript</title>
    <style>
        body{
            background-color: blue;
        }
        p{
            background-color: orange;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: medium;

        }
        h1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: larger;
        }
    </style>
</head>
<body>
    <h1><u>Array Example</u></h1>
    <p id="output"></p>
    <script>
        let planes=["B737","A380","F15","A321neo"]
        let output="First Plane " +planes[0]+ ", Plane Two " +planes[1]+ ", Plane Three " +planes[2]+ ", Plane Four " +planes[3]
        document.getElementById("output").innerHTML=output
    </script>
</body>
</html>
